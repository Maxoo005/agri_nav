name: agri_nav
description: Rolnicza nawigacja GNSS — Flutter + C++
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  # Offline tiles — cache + pre-download regionów (FMTC)
  flutter_map_tile_caching: ^9.1.0
  # Wykrywanie dostępności sieci
  connectivity_plus: ^6.0.0
  # Trwałe przechowywanie danych (pola uprawowe)
  hive_flutter: ^1.1.0
  # Generowanie unikalnych ID pól
  uuid: ^4.4.0
  # HTTP — zapytania do ULDK / GUGiK
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
